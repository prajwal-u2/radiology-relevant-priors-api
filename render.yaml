services:
  - type: web
    name: relevant-priors-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 2
    envVars:
      - key: OPENAI_API_KEY
        sync: false   # set this manually in Render dashboard
    healthCheckPath: /health
